services:
  ppsspp-wasm-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8081:8081"
      - "27312:27312"
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/app
      - ${WASM_ROOT:-./deps/ppsspp-wasm}:/wasm:ro
    working_dir: /app/server
    command:
      - python3
      - serve.py
      - --https
      - --bind
      - 0.0.0.0
      - --port
      - "8081"
      - --wasm-root
      - /wasm
      - --adhoc-ws
